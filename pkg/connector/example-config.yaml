# Displayname template for Data Machine agents.
# Available variables: .Name, .Slug, .SiteURL
displayname_template: "{{.Name}}"

# Default WordPress site URL shown during login.
# The browser login flow will authorize the configured agent slug on this site.
# The bridge fetches /wp-json/chat-bridge/v1/onboarding from this URL
# to populate login instructions, display names, welcome messages, and room config.
default_site_url: "https://studio.extrachill.com"

# Agent slug to authorize through the browser flow.
# This slug is passed to the onboarding endpoint to get agent-specific metadata.
agent_slug: "roadie"

# How often to poll WordPress for pending messages (default: 5s).
poll_interval: 5s

# Timeout for HTTP requests to the WordPress site (default: 30s).
request_timeout: 30s

# Public callback URL for PKCE browser login redirect.
# This exact URL must be allowed in the agent's allowed_redirect_uris config.
callback_url: ""

# Port for the callback listener (default: 29340).
callback_port: 29340

# Override the network display name shown in Beeper's sidebar.
# If empty, uses the site_name from WordPress onboarding metadata, or "Data Machine" as fallback.
network_display_name: ""

# How long a chat session can be idle before the bridge starts a fresh one.
# The agent's memory files (SOUL.md, MEMORY.md) persist across sessions,
# so the agent still "remembers" the user — only the immediate conversation resets.
# Set to 0 to disable auto-rotation (sessions persist forever).
# Default: 24h.
session_idle_ttl: 24h
